[General]
DisableDefaultImports=false
MaxWarnings=-1

[Warnings]
# Quickshell's PanelWindow, WlrLayershell etc. are declaratively-instantiated
# types that qmllint flags as uncreatable regardless of import resolution.
UncreatableType=disable
# QProcess::ExitStatus isn't in qmllint's QML type registry, so any Process
# onExited signal handler trips this check even though the code works.
BadSignalHandlerParameters=disable
